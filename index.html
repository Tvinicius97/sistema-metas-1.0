<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Metas - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FIREBASE SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        /* Tela de Login */
        .login-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 400px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .login-header i {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .login-header p {
            opacity: 0.9;
        }

        .login-form {
            padding: 40px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Tela de Perfis */
        .profiles-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            animation: slideIn 0.5s ease;
            display: none;
        }

        .profiles-container:not(.hidden) {
            display: block;
        }

        .profiles-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .user-details h2 {
            color: #333;
            font-size: 1.3rem;
        }

        .user-details p {
            color: #666;
            font-size: 0.9rem;
        }

        .user-badge {
            background-color: #e0e7ff;
            color: #4f46e5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .logout-btn {
            padding: 10px 20px;
            background-color: #f0f0f0;
            border: none;
            border-radius: 8px;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .profiles-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .profiles-title h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .profiles-title p {
            color: #666;
        }

        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .profile-card {
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .profile-card:hover::before {
            opacity: 1;
        }

        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .profile-icon {
            width: 70px;
            height: 70px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            position: relative;
            z-index: 1;
        }

        .profile-card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .profile-card p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 15px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .profile-badge {
            background-color: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .profile-owner-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(255,215,0,0.9);
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Cores por função */
        .assistente-adm { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .especialista-processo { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .supervisor { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .especialista-manutencao { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

        .info-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border-left: 4px solid #667eea;
        }

        .info-box h4 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box ul {
            list-style: none;
        }

        .info-box li {
            margin-bottom: 8px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box i {
            color: #667eea;
        }

        .hidden {
            display: none !important;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #667eea;
        }

        .restricted-message {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .restricted-message i {
            font-size: 1.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .profiles-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .profiles-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .profiles-grid {
                grid-template-columns: 1fr;
            }
            .login-form {
                padding: 20px;
            }
            .login-header {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA DE LOGIN -->
        <div id="loginScreen" class="login-container">
            <div class="login-header">
                <i class="fas fa-user-lock"></i>
                <h1>Sistema de Metas</h1>
                <p>Faça login para acessar os perfis</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
                
                <button class="login-btn" onclick="fazerLogin()">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                
                <div id="loginError" class="error-message">
                    <i class="fas fa-exclamation-circle"></i> E-mail ou senha incorretos!
                </div>
            </div>
        </div>

        <!-- TELA DE PERFIS -->
        <div id="profilesScreen" class="profiles-container hidden">
            <div class="profiles-header">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user" id="userAvatar"></i>
                    </div>
                    <div class="user-details">
                        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                            <h2 id="userNameDisplay">Carregando...</h2>
                            <span id="userTypeBadge" class="user-badge"></span>
                        </div>
                        <p><i class="fas fa-circle" style="color: #2ecc71; font-size: 0.5rem;"></i> Logado com sucesso</p>
                    </div>
                </div>
                
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>

            <div class="profiles-title">
                <h2 id="profilesTitle">Lista de Funcionários</h2>
                <p id="profilesSubtitle">Selecione um perfil para visualizar as metas</p>
            </div>

            <div id="loadingProfiles" class="loading">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Carregando perfis...</p>
            </div>

            <!-- mensagem para clicar no perfil-->
            <div id="restrictedMessage" class="restricted-message hidden">
                <i class="fas fa-info-circle"></i>
                <span>Você tem acesso apenas ao seu próprio perfil. Clique no seu card para visualizar as metas.</span>
            </div>

            <!-- Grid perfs 
            <div id="profilesGrid" class="profiles-grid"></div>

            <div class="info-box">
                <h4><i class="fas fa-info-circle"></i> Informações</h4>
                <ul id="infoList">
                    <li><i class="fas fa-check-circle"></i> Clique em qualquer perfil para abrir</li>
                    <li><i class="fas fa-check-circle"></i> Use o botão "Sair" para voltar ao login</li>
                </ul>
            </div>      desativei pq não é possível que precisem desse comentário-->
        </div>
    </div>

    <script>
        //  CONFIGURAÇÕES DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD_tJfqaCSvanVu0Rmr7qD2fAasEVwelOw",
            authDomain: "sistema-de-metas-f0fea.firebaseapp.com",
            projectId: "sistema-de-metas-f0fea",
            storageBucket: "sistema-de-metas-f0fea.firebasestorage.app",
            messagingSenderId: "316922806030",
            appId: "1:316922806030:web:25cad5c80de9a4acba215f"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // LISTA COMPLETA DE PERFIS (lembra de atualizar a planilha pra n se perder )
        const todosPerfis = [
            { id: 1, nome: "TELMO LIMA", funcao: "Assistente Administrativo", tipo: "assistente-adm", icone: "user-tie", setor: "Manufatura" },
            { id: 2, nome: "CLEITON PAULO", funcao: "Assistente Administrativo", tipo: "assistente-adm", icone: "user-tie", setor: "Manufatura" },
            { id: 3, nome: "EFRAYN SILVA", funcao: "Assistente Administrativo", tipo: "assistente-adm", icone: "user-tie", setor: "Manufatura" },
            { id: 4, nome: "JEAN PIERRE", funcao: "Especialista de Processos", tipo: "especialista-processo", icone: "user-tie", setor: " Manufatura" },
            { id: 5, nome: "RAFAEL CARLOS", funcao: "Supervisor de Produção", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 6, nome: "ROMERO XAVIER", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 7, nome: "VINICIUS NUNES", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 8, nome: "SERGIO CUNHA", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 9, nome: "JOÃO PAULO", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 10, nome: "ANIELLO AULETTE", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 11, nome: "JOSÉ ROBERTO", funcao: "Supervisor", tipo: "supervisor", icone: "user-tie", setor: "Manufatura" },
            { id: 12, nome: "DAVID", funcao: "Especialista de Manutenção", tipo: "especialista-manutencao", icone: "tools", setor: "Manutenção" },
            { id: 13, nome: "CLAUDIVAN", funcao: "Especialista de Manutenção", tipo: "especialista-manutencao", icone: "tools", setor: "Manutenção" }
        ];

        // e-mails para IDs de perfil 
        const emailParaPerfil = {
            "telmo.lima@system.com": 1,
            "cleiton.paulo@system.com": 2,
            "efrayn.silva@system.com": 3,
            "jean.pierre@system.com":4,
            "rafaelcarlos@system.com":5,
            "romeroxavier@system.com":6,
            "vinicius.nunes@system.com":7,
            "sergio.cunha@system.com":8,
            "joão.paulo@system.com":9,
            "anielloaulette@system.com":10,
            "joséroberto@system.com":11,
            "david33@system.com":12,
            "claudivan78@system.com":13,
            "maicon.paiao@system.com": null,  // Gerente 
            "janailson@system.com": null   // Gerente 
        };

        // USUÁRIOS ADMIN 
        const admins = [
            "maicon.paiao@system.com",
            "janailson@system.com"
        ];

        // Função para buscar/criar dados do usuário no Realtime Database
        async function getOrCreateUserData(user) {
            const userRef = database.ref('usuarios/' + user.uid);
            try {
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                if (userData) {
                    console.log("Usuário encontrado:", userData); // DEBUG
                    return userData;
                } else {
                    // Determinar tipo de usuário baseado no email
                    const email = user.email.toLowerCase();
                    console.log("Email do usuário:", email); // DEBUG
                    console.log("Lista de admins:", admins); // DEBUG
                    console.log("Email está nos admins?", admins.includes(email)); // DEBUG
                    
                    const tipo = admins.includes(email) ? 'admin' : 'funcionario';
                    const perfilVinculado = emailParaPerfil[email] || null;
                    
                    console.log("Tipo determinado:", tipo); // DEBUG
                    console.log("Perfil vinculado:", perfilVinculado); // DEBUG
                    
                    const novoUsuario = {
                        email: user.email,
                        tipo: tipo,
                        perfilVinculado: perfilVinculado,
                        nome: email.split('@')[0],
                        criadoEm: new Date().toISOString()
                    };
                    
                    console.log("Criando novo usuário:", novoUsuario); // DEBUG
                    await userRef.set(novoUsuario);
                    return novoUsuario;
                }
            } catch (error) {
                console.error("Erro ao buscar/criar usuário:", error);
                return {
                    email: user.email,
                    tipo: 'funcionario',
                    perfilVinculado: emailParaPerfil[user.email.toLowerCase()] || null
                };
            }
        }
        // Função para renderizar perfis baseado no tipo de usuário
        async function renderizarPerfis(user) {
            const profilesGrid = document.getElementById('profilesGrid');
            const loadingProfiles = document.getElementById('loadingProfiles');
            const restrictedMessage = document.getElementById('restrictedMessage');
            const profilesTitle = document.getElementById('profilesTitle');
            const profilesSubtitle = document.getElementById('profilesSubtitle');
            const infoList = document.getElementById('infoList');
            const userTypeBadge = document.getElementById('userTypeBadge');

            // Mostrar loading
            loadingProfiles.style.display = 'block';
            profilesGrid.innerHTML = '';
            
            try {
                // Buscar dados do usuário
                const userData = await getOrCreateUserData(user);
                const isAdmin = userData.tipo === 'admin';
                
                // Atualizar badge do usuário
                userTypeBadge.textContent = isAdmin ? 'Gerente' : 'Funcionário';
                userTypeBadge.style.backgroundColor = isAdmin ? '#4f46e5' : '#6b7280';
                userTypeBadge.style.color = 'white';

                // Atualizar mensagens baseado no tipo
                if (isAdmin) {
                    profilesTitle.textContent = 'Lista de Funcionários';
                    profilesSubtitle.textContent = 'Selecione um perfil para visualizar as metas';
                    restrictedMessage.classList.add('hidden');
                    
                    // Mostrar todos os perfis
                    const perfisParaMostrar = todosPerfis;
                    
                    perfisParaMostrar.forEach(perfil => {
                        profilesGrid.innerHTML += criarCardPerfil(perfil, userData);
                    });

                    // Atualizar info box para admin
                    infoList.innerHTML = `
                        <li><i class="fas fa-check-circle"></i> Você é GERENTE - tem acesso a todos os ${perfisParaMostrar.length} perfis</li>
                        <li><i class="fas fa-check-circle"></i> Clique em qualquer perfil para abrir</li>
                        <li><i class="fas fa-check-circle"></i> Use o botão "Sair" para voltar ao login</li>
                    `;
                } else {
                    profilesTitle.textContent = 'Meu Perfil';
                    profilesSubtitle.textContent = 'Visualize suas metas';
                    restrictedMessage.classList.remove('hidden');
                    
                    // Mostrar apenas o perfil do usuário
                    const perfilUsuario = todosPerfis.find(p => p.id === userData.perfilVinculado);
                    
                    if (perfilUsuario) {
                        profilesGrid.innerHTML = criarCardPerfil(perfilUsuario, userData, true);
                    } else {
                        profilesGrid.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                                <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f59e0b; margin-bottom: 15px;"></i>
                                <h3>Perfil não encontrado</h3>
                                <p>Não foi possível encontrar seu perfil vinculado. Contate o administrador.</p>
                            </div>
                        `;
                    }

                    // Atualizar info box para funcionário
                    infoList.innerHTML = `
                        <li><i class="fas fa-check-circle"></i> Você tem acesso apenas ao seu próprio perfil</li>
                        <li><i class="fas fa-check-circle"></i> Clique no seu perfil para visualizar as metas</li>
                        <li><i class="fas fa-check-circle"></i> Use o botão "Sair" para voltar ao login</li>
                    `;
                }
            } catch (error) {
                console.error("Erro ao renderizar perfis:", error);
                profilesGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ef4444; margin-bottom: 15px;"></i>
                        <h3>Erro ao carregar perfis</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            } finally {
                loadingProfiles.style.display = 'none';
            }
        }

        // Função auxiliar para criar card de perfil
        function criarCardPerfil(perfil, userData, isOwnProfile = false) {
            const isAdmin = userData.tipo === 'admin';
            const ownProfileIndicator = isOwnProfile ? 
                '<div class="profile-owner-indicator" title="Seu perfil"><i class="fas fa-star"></i></div>' : '';
            
            return `
                <div class="profile-card ${perfil.tipo}" onclick="abrirPerfil(${perfil.id}, '${perfil.nome}')">
                    ${ownProfileIndicator}
                    <div class="profile-icon">
                        <i class="fas fa-${perfil.icone}"></i>
                    </div>
                    <h3>${perfil.nome}</h3>
                    <p>${perfil.funcao}</p>
                    <span class="profile-badge">${perfil.setor}</span>
                </div>
            `;
        }

        // FUNÇÃO DE LOGIN
        function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');

            if (!email || !password) {
                errorElement.textContent = "Preencha todos os campos!";
                errorElement.classList.add('show');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(async (userCredential) => {
                    const user = userCredential.user;
                    
                    document.getElementById('userNameDisplay').textContent = user.email;
                    
                    // Renderizar perfis baseado no tipo de usuário
                    await renderizarPerfis(user);
                    
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('profilesScreen').classList.remove('hidden');
                    
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    errorElement.classList.remove('show');
                })
                .catch((error) => {
                    errorElement.textContent = "E-mail ou senha incorretos!";
                    errorElement.classList.add('show');
                });
        }

        // FUNÇÃO DE LOGOUT
        function logout() {
            auth.signOut().then(() => {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('profilesScreen').classList.add('hidden');
                document.getElementById('profilesGrid').innerHTML = '';
            });
        }

        // VERIFICAR SE USUÁRIO ESTÁ LOGADO
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('userNameDisplay').textContent = user.email;
                
                // Renderizar perfis baseado no tipo de usuário
                await renderizarPerfis(user);
                
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('profilesScreen').classList.remove('hidden');
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('profilesScreen').classList.add('hidden');
            }
        });

        // FUNÇÃO PARA ABRIR PERFIL
        function abrirPerfil(numero, nomePerfil) {
            const user = auth.currentUser;
            if (!user) {
                alert('Faça login primeiro!');
                return;
            }

            // Mapeamento de IDs para arquivos
            const perfis = {
                1: "perfil 1.html",
                2: "perfil 2.html", 
                3: "perfil 3.html",
                4: "perfil 4.html",
                5: "perfil 5.html",
                6: "perfil 6.html",
                7: "perfil 7.html",
                8: "perfil 8.html",
                9: "perfil 9.html",
                10: "perfil 10.html",
                11: "perfil 11.html",
                12: "perfil 12.html",
                13: "perfil 13.html"
            };

            window.location.href = perfis[numero];
        }

        // PERMITIR ENTER NO LOGIN
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });

        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
